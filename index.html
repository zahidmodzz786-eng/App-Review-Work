<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Review Name Extractor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0f;--surface:#13131a;--card:#1a1a24;--border:#2a2a3a;
  --ink:#f0eeff;--ink2:#8888aa;--accent:#7c5cfc;--accent2:#fc5c7c;
  --green:#3cffa0;--r:12px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding:28px 16px 60px}
.orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(80px);opacity:0.15}
.orb1{width:400px;height:400px;background:var(--accent);top:-100px;right:-100px}
.orb2{width:300px;height:300px;background:var(--accent2);bottom:-80px;left:-80px}
.wrap{max-width:680px;margin:0 auto;position:relative;z-index:1}
header{margin-bottom:36px;padding-top:8px}
.label{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:0.7rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink2);margin-bottom:18px}
.label::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,7vw,3.2rem);font-weight:800;line-height:1.0;letter-spacing:-0.02em}
h1 .g{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{margin-top:12px;color:var(--ink2);font-size:0.88rem;line-height:1.7;max-width:440px}
.drop{border:1.5px dashed var(--border);border-radius:16px;background:var(--surface);padding:36px 20px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
.drop:hover,.drop.over{border-color:var(--accent);background:rgba(124,92,252,0.05)}
.drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:2.2rem;margin-bottom:12px}
.drop h3{font-weight:500;font-size:0.95rem;margin-bottom:4px}
.drop p{font-size:0.78rem;color:var(--ink2)}
.badge{display:inline-block;margin-top:10px;background:rgba(124,92,252,0.15);border:1px solid rgba(124,92,252,0.3);color:var(--accent);font-size:0.7rem;font-weight:600;letter-spacing:0.05em;padding:3px 12px;border-radius:20px}
.thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:8px;margin-top:16px}
.thumb{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:9/16;background:var(--card)}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb .rm{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.7);border:none;border-radius:50%;width:20px;height:20px;color:#fff;font-size:0.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.thumb .chip{position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:0.6rem;font-weight:700;padding:4px;letter-spacing:0.03em}
.chip.done{background:rgba(60,255,160,0.85);color:#000}
.chip.proc{background:var(--accent);color:#fff;animation:pulse 1s infinite}
.chip.err{background:var(--accent2);color:#fff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.run{width:100%;margin-top:18px;padding:15px;display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,var(--accent),#5b3fd4);border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.97rem;font-weight:600;color:#fff;cursor:pointer;transition:all 0.2s}
.run:hover{filter:brightness(1.1);transform:translateY(-1px)}
.run:disabled{opacity:0.5;cursor:not-allowed;transform:none;filter:none}
.run .sp{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:none}
.run.loading .sp{display:block}
.run.loading .bt{opacity:0.7}
@keyframes spin{to{transform:rotate(360deg)}}
.results{margin-top:32px}
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.rh h2{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800}
.copy-all{background:rgba(60,255,160,0.12);border:1px solid rgba(60,255,160,0.3);color:var(--green);border-radius:8px;padding:7px 15px;font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.15s}
.copy-all:hover{background:rgba(60,255,160,0.2)}
.summary{background:rgba(60,255,160,0.08);border:1px solid rgba(60,255,160,0.2);border-radius:10px;padding:11px 16px;font-size:0.84rem;color:var(--green);font-weight:500;margin-bottom:14px}
.grid{display:flex;flex-direction:column;gap:7px}
.row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 15px;animation:fadeUp 0.3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.num{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--accent);min-width:30px}
.val{flex:1;font-size:0.95rem;font-weight:500}
.src{font-size:0.68rem;color:var(--ink2);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:auto}
.cp{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:0.72rem;font-family:'DM Sans',sans-serif;color:var(--ink2);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.cp:hover{border-color:var(--accent);color:var(--accent)}
.exports{display:flex;gap:8px;margin-top:14px}
.ex{flex:1;padding:11px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;color:var(--ink2);transition:all 0.15s}
.ex:hover{border-color:var(--ink2);color:var(--ink)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--card);border:1px solid var(--border);color:var(--ink);padding:9px 18px;border-radius:50px;font-size:0.82rem;opacity:0;transition:all 0.25s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="wrap">
  <header>
    <div class="label">AI-Powered</div>
    <h1>Review <span class="g">Name</span><br>Extractor</h1>
    <p class="sub">Upload up to 20 Google Play or App Store review screenshots — AI reads every reviewer's name instantly.</p>
  </header>

  <div class="drop" id="drop">
    <input type="file" id="fi" accept="image/*" multiple/>
    <div class="drop-icon">📱</div>
    <h3>Drop screenshots here or tap to browse</h3>
    <p>JPG · PNG · WEBP — up to 20 images</p>
    <span class="badge">MAX 20 IMAGES</span>
  </div>

  <div class="thumbs" id="thumbs"></div>

  <button class="run" id="runBtn" style="display:none" onclick="extractAll()">
    <div class="sp"></div>
    <span class="bt">🔍 Extract All Names</span>
  </button>

  <div class="results" id="results" style="display:none">
    <div class="rh">
      <h2>Extracted Names</h2>
      <button class="copy-all" onclick="copyAll()">📋 Copy All</button>
    </div>
    <div class="summary" id="summary"></div>
    <div class="grid" id="grid"></div>
    <div class="exports">
      <button class="ex" onclick="exportTxt()">⬇ Download .TXT</button>
      <button class="ex" onclick="exportCsv()">⬇ Download .CSV</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const fi = document.getElementById('fi');
const drop = document.getElementById('drop');
const thumbsEl = document.getElementById('thumbs');
const runBtn = document.getElementById('runBtn');
const resultsEl = document.getElementById('results');
const grid = document.getElementById('grid');
const summary = document.getElementById('summary');
let files = [];

drop.addEventListener('dragover', e=>{e.preventDefault();drop.classList.add('over')});
drop.addEventListener('dragleave', ()=>drop.classList.remove('over'));
drop.addEventListener('drop', e=>{e.preventDefault();drop.classList.remove('over');addFiles(e.dataTransfer.files)});
fi.addEventListener('change', ()=>{addFiles(fi.files);fi.value=''});

function addFiles(list) {
  const rem = 20 - files.length;
  if(rem<=0){toast('Max 20 images reached');return}
  Array.from(list).slice(0,rem).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{files.push({file:f,url:e.target.result,name:null,status:'pending'});render()};
    r.readAsDataURL(f);
  });
}

function render() {
  thumbsEl.innerHTML = files.map((f,i)=>`
    <div class="thumb">
      <img src="${f.url}"/>
      <button class="rm" onclick="del(${i})">✕</button>
      ${f.status==='done'?'<div class="chip done">✓ Done</div>':''}
      ${f.status==='processing'?'<div class="chip proc">···</div>':''}
      ${f.status==='error'?'<div class="chip err">Error</div>':''}
    </div>`).join('');
  runBtn.style.display = files.length?'flex':'none';
}

function del(i){files.splice(i,1);render();if(!files.length)resultsEl.style.display='none'}

async function extractAll() {
  runBtn.classList.add('loading');runBtn.disabled=true;
  resultsEl.style.display='none';grid.innerHTML='';
  files.forEach(f=>{f.status='pending';f.name=null});render();

  for(let i=0;i<files.length;i++){
    files[i].status='processing';render();
    try{files[i].name=await extractName(files[i].url);files[i].status='done'}
    catch(e){files[i].status='error'}
    render();
  }
  runBtn.classList.remove('loading');runBtn.disabled=false;
  showResults();
}

async function extractName(dataUrl) {
  const base64=dataUrl.split(',')[1];
  const mt=(dataUrl.match(/data:(image\/\w+);/)||[])[1]||'image/jpeg';
  const res = await fetch('/api/extract', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:200,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mt,data:base64}},
        {type:'text',text:'This screenshot shows one or more app store reviews. Extract ALL reviewer names visible. Return ONLY the names, one per line, nothing else. If none found, return "Unknown".'}
      ]}]
    })
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data.content[0].text.trim();
}

function showResults() {
  const done=files.filter(f=>f.status==='done');
  const errs=files.filter(f=>f.status==='error').length;
  summary.textContent=`✅ Extracted names from ${done.length} screenshot${done.length!==1?'s':''}${errs?` · ${errs} failed`:''}`;
  grid.innerHTML='';
  let idx=0;
  files.forEach(f=>{
    if(f.status!=='done')return;
    f.name.split('\n').map(n=>n.trim()).filter(Boolean).forEach(name=>{
      idx++;
      const row=document.createElement('div');
      row.className='row';
      row.style.animationDelay=(idx*0.04)+'s';
      row.innerHTML=`<span class="num">${String(idx).padStart(2,'0')}</span><span class="val">${esc(name)}</span><span class="src">${esc(f.file.name)}</span><button class="cp" onclick="copyOne('${esc(name)}')">Copy</button>`;
      grid.appendChild(row);
    });
  });
  resultsEl.style.display='block';
  resultsEl.scrollIntoView({behavior:'smooth',block:'start'});
}

function copyAll(){const all=allNames().join('\n');navigator.clipboard.writeText(all).then(()=>toast('All names copied!'))}
function copyOne(n){navigator.clipboard.writeText(n).then(()=>toast(`"${n}" copied!`))}
function allNames(){return files.filter(f=>f.name).flatMap(f=>f.name.split('\n').map(n=>n.trim()).filter(Boolean))}
function allNamesWithSrc(){return files.filter(f=>f.name).flatMap(f=>f.name.split('\n').map(n=>n.trim()).filter(Boolean).map(n=>({name:n,src:f.file.name})))}
function exportTxt(){dl('reviewer-names.txt',allNames().map((n,i)=>`${i+1}. ${n}`).join('\n'),'text/plain')}
function exportCsv(){dl('reviewer-names.csv',['#,Name,Screenshot'].concat(allNamesWithSrc().map((x,i)=>`${i+1},"${x.name}","${x.src}"`)).join('\n'),'text/csv')}
function dl(fn,content,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=fn;a.click();toast(`${fn} downloaded!`)}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
</script>
</body>
</html>
