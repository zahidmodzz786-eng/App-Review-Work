<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Review Name Extractor</title>
</head>

<body style="background:#111;color:#fff;font-family:sans-serif;text-align:center;padding:20px">

<h2>Upload Images</h2>
<input type="file" id="fi" multiple accept="image/*"><br><br>
<button onclick="extractAll()">Extract Names</button>

<pre id="output" style="margin-top:20px;text-align:left;"></pre>

<script>
const fi = document.getElementById('fi');
const output = document.getElementById('output');

async function extractAll() {
  const files = fi.files;
  if (!files.length) return alert("Upload images first");

  output.textContent = "Processing...\n";

  for (let i = 0; i < files.length; i++) {
    try {
      const base64 = await toBase64(files[i]);

      const res = await fetch(`${window.location.origin}/api/extract`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: "claude-3-haiku-20240307",
          max_tokens: 200,
          messages: [{
            role: "user",
            content: [
              {
                type: "image",
                source: {
                  type: "base64",
                  media_type: files[i].type,
                  data: base64.split(',')[1]
                }
              },
              {
                type: "text",
                text: "Extract all reviewer names. Only names, one per line."
              }
            ]
          }]
        })
      });

      const data = await res.json();

      // SAFE ERROR HANDLING
      if (data.error) {
        console.log("API ERROR:", data.error);
        output.textContent += `❌ Error in image ${i+1}\n`;
        continue;
      }

      if (!data.content || !data.content[0]) {
        output.textContent += `❌ Invalid response ${i+1}\n`;
        continue;
      }

      const text = data.content[0].text.trim();
      output.textContent += `✅ Image ${i+1}:\n${text}\n\n`;

    } catch (err) {
      console.log("JS ERROR:", err);
      output.textContent += `❌ Failed ${i+1}\n`;
    }
  }
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
  });
}
</script>

</body>
</html>
